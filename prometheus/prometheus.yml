global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: pushgateway
    honor_labels: true            # 保留 push 時的 job/pipeline 標籤
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
