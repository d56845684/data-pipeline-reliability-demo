global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: pushgateway
    honor_labels: true            # 保留 push 時的 job/pipeline 標籤
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  # case2 workers 以 DNS A 紀錄探索，支援 --scale 水平擴容後自動納入抓取
  - job_name: case2-workers
    dns_sd_configs:
      - names: ["case2-uploader", "case2-preprocess", "case2-vector", "case2-dlq-sentinel"]
        type: A
        port: 8000
        refresh_interval: 15s
