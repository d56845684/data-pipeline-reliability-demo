groups:
  - name: case1-etl-reliability
    rules:
      # ---- Critical：中斷性故障 ----
      - alert: ETLJobFailed
        expr: etl_job_status == 2
        labels:
          severity: critical
        annotations:
          summary: "ETL 失敗：{{ $labels.pipeline }}"
          description: "管道 {{ $labels.pipeline }}（{{ $labels.criticality }}）blocking 檢核失敗或檔案損毀，已中斷載入"

      - alert: ETLBlockingCheckFailed
        expr: etl_check_failed{severity="blocking"} == 1
        labels:
          severity: critical
        annotations:
          summary: "Blocking 檢核失敗：{{ $labels.pipeline }} / {{ $labels.check }}"
          description: "{{ $labels.check }} 檢核未通過（暗碼洩漏/主鍵重複/schema 變更屬最高風險）"

      # ---- Warning：品質與時效劣化 ----
      - alert: ETLFileMissing
        expr: etl_job_status == 3
        labels:
          severity: warning
        annotations:
          summary: "來源檔案缺失：{{ $labels.pipeline }}"
          description: "管道 {{ $labels.pipeline }} 當日檔案未到（可能上游延遲），請依 runbook 確認來源系統"

      - alert: ETLRowCountAnomaly
        expr: abs(etl_rowcount_zscore) > 3
        labels:
          severity: warning
        annotations:
          summary: "筆數偏離同期基線：{{ $labels.pipeline }}"
          description: "z-score = {{ $value | printf \"%.1f\" }}，疑似上游靜默少送/多送資料"

      - alert: ETLNullRatioHigh
        expr: etl_null_ratio > 0.10
        labels:
          severity: warning
        annotations:
          summary: "空值率異常：{{ $labels.pipeline }} / {{ $labels.column }}"
          description: "關鍵欄位 {{ $labels.column }} 空值率 {{ $value | humanizePercentage }} 超過 10% 閾值"

      - alert: ETLDurationDegraded
        expr: etl_duration_ratio > 1.10
        labels:
          severity: warning
        annotations:
          summary: "執行時間劣化：{{ $labels.pipeline }}"
          description: "本次執行時間為過往 N 次成功執行平均的 {{ $value | printf \"%.2f\" }} 倍（>110%），可能為資料量暴增或資源爭用（沒失敗但變慢的隱性劣化）"

      - alert: ETLFreshnessLag
        expr: etl_freshness_days > 2
        labels:
          severity: warning
        annotations:
          summary: "資料時效落後：{{ $labels.pipeline }}"
          description: "最新事件日期落後營業日 {{ $value }} 天"

      - alert: ETLPipelineStale
        expr: time() - etl_last_success_timestamp > 90
        labels:
          severity: critical
        annotations:
          summary: "管道停擺：{{ $labels.pipeline }}"
          description: "已超過 90 秒（約 6 個模擬日）沒有成功的 ETL 執行"

  - name: case1-db-health
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 連線失敗"
          description: "postgres-exporter 無法連上資料庫，所有 ETL 載入將停擺"

      - alert: PGConnectionsHigh
        expr: sum(pg_stat_activity_count) / max(pg_settings_max_connections) > 0.8
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 連線數超過 80%"
          description: "目前使用率 {{ $value | humanizePercentage }}，再增長將拒絕新連線（檢查 connection pool 設定/連線洩漏）"

      - alert: PGCacheHitRatioLow
        expr: >
          rate(pg_stat_database_blks_hit{datname="warehouse"}[5m])
          / (rate(pg_stat_database_blks_hit{datname="warehouse"}[5m])
             + rate(pg_stat_database_blks_read{datname="warehouse"}[5m])) < 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL cache hit ratio 偏低"
          description: "warehouse 庫 cache hit {{ $value | humanizePercentage }} < 90%，查詢大量落盤（檢查 shared_buffers 或異常查詢模式）"

      - alert: PGDeadlocks
        expr: increase(pg_stat_database_deadlocks{datname="warehouse"}[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 發生 deadlock"
          description: "5 分鐘內偵測到 {{ $value }} 次 deadlock，檢查並行寫入交易的鎖順序"
