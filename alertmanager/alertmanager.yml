route:
  receiver: dataops-webhook
  group_by: ["alertname", "pipeline"]
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 5m
  routes:
    # critical 立即送出，模擬 PagerDuty 即時呼叫值班
    - receiver: dataops-webhook
      matchers: ['severity="critical"']
      group_wait: 0s

receivers:
  - name: dataops-webhook
    webhook_configs:
      - url: http://alert-logger:5001/alerts
        send_resolved: true
