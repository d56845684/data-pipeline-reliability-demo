services:
  # ---------- 資料層 ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: warehouse
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d warehouse"]
      interval: 3s
      timeout: 3s
      retries: 20

  # ---------- 監控層 ----------
  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "19091:9091"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
    depends_on:
      - pushgateway
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "19093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro

  alert-logger:
    build: ./alert_logger
    ports:
      - "15001:5001"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ---------- 上游模擬：固定節奏持續落檔的 producer ----------
  producer:
    build: ./case1
    command: ["python", "producer_service.py"]
    environment:
      PRODUCE_INTERVAL_SECONDS: "15"  # 每 15 秒落檔一個營業日
      WARMUP_DAYS: "14"               # 落地區為空時快速建立基線資料
      ERROR_MULTIPLIER: "1.0"         # 調高可增加錯誤頻率（如 2.0）
      SEED: "42"
      DATA_DIR: /data/landing
      FORCE_FILE: /data/force_error.json
    volumes:
      - landing:/data

  # ---------- ETL：掃描落地區、品質檢核、載入、上報 ----------
  etl:
    build: ./case1
    command: ["python", "etl_service.py"]
    environment:
      ETL_SCAN_SECONDS: "3"
      PUSHGATEWAY_URL: pushgateway:9091
      PG_DSN: postgresql://etl:etl@postgres:5432/warehouse
      DATA_DIR: /data/landing
    volumes:
      - landing:/data
    depends_on:
      postgres:
        condition: service_healthy
      pushgateway:
        condition: service_started

volumes:
  pgdata:
  landing:
