services:
  # ---------- 資料層 ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: warehouse
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d warehouse"]
      interval: 3s
      timeout: 3s
      retries: 20

  # 生產資料庫監控（連線數、TPS、cache hit、deadlock…）
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://etl:etl@postgres:5432/warehouse?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- 監控層 ----------
  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "19091:9091"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
    depends_on:
      - pushgateway
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "19093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro

  alert-logger:
    build: ./alert_logger
    ports:
      - "15001:5001"
    environment:
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_TARGET_ID: ${LINE_TARGET_ID:-}
      LINE_SEND_RESOLVED: ${LINE_SEND_RESOLVED:-false}

  # LINE webhook 對外通道（僅設定 LINE 時需要）：docker compose --profile line up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["line"]
    command: tunnel --no-autoupdate --url http://alert-logger:5001
    depends_on:
      - alert-logger

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ---------- 上游模擬：固定節奏持續落檔的 producer ----------
  producer:
    build: ./case1
    command: ["python", "producer_service.py"]
    environment:
      PRODUCE_INTERVAL_SECONDS: "15"  # 每 15 秒落檔一個營業日
      WARMUP_DAYS: "14"               # 落地區為空時快速建立基線資料
      ERROR_MULTIPLIER: "1.0"         # 調高可增加錯誤頻率（如 2.0）
      SEED: "42"
      DATA_DIR: /data/landing
      FORCE_FILE: /data/force_error.json
    volumes:
      - landing:/data

  # ---------- 排程層：Airflow（DAG 工廠 + dynamic task mapping）----------
  airflow:
    image: apache/airflow:2.10.4
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl:etl@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "10"
      AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: "false"
      # demo 便利性：容器啟動時補裝框架層相依（production 應改 bake 進自有 image）
      _PIP_ADDITIONAL_REQUIREMENTS: prometheus-client==0.21.1
      # 框架層（/opt/case1）的設定
      PYTHONPATH: /opt/case1
      PUSHGATEWAY_URL: pushgateway:9091
      PG_DSN: postgresql://etl:etl@postgres:5432/warehouse
      DATA_DIR: /data/landing
    ports:
      - "18080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./case1:/opt/case1:ro
      - landing:/data
    depends_on:
      postgres:
        condition: service_healthy
      pushgateway:
        condition: service_started

  # ================= Case 2：多租戶佇列檔案處理 =================
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "15672:15672"   # management UI（guest/guest）
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/20-demo.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  case2-uploader:
    build: ./case2
    command: ["python", "uploader.py"]
    environment:
      UPLOAD_INTERVAL_SECONDS: "3"
      SEED: "7"
      ERROR_MULTIPLIER: "1.0"   # 隨機異常頻率倍數（0 = 關閉隨機注入）
    depends_on:
      rabbitmq:
        condition: service_healthy

  case2-preprocess:
    build: ./case2
    command: ["python", "preprocess_worker.py"]
    environment:
      PER_TENANT_QUEUES: ${PER_TENANT_QUEUES:-false}   # false = 事故架構（共用佇列）
    depends_on:
      rabbitmq:
        condition: service_healthy

  case2-vector:
    build: ./case2
    command: ["python", "vector_worker.py"]
    environment:
      PER_TENANT_QUEUES: ${PER_TENANT_QUEUES:-false}
      BATCH_WRITES: ${BATCH_WRITES:-true}     # true = 批次 embedding + batch upsert（修復後）
      EMBED_BASE_MS: "30"                     # 每次推論呼叫的固定 overhead
      EMBED_MS_PER_TOKEN: "0.05"
      EMBED_DIM: "384"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  landing:
